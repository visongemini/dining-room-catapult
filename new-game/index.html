<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #202020; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 850px; background: #f0e6d2; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        /* UI */
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 10px; z-index: 100; pointer-events: none; }
        .ui-group { display: flex; gap: 10px; pointer-events: auto; }
        .pixel-btn { background: #fff; border: 4px solid #000; padding: 5px; cursor: pointer; font-size: 16px; box-shadow: 4px 4px 0 rgba(0,0,0,0.2); }
        .pixel-btn:active { box-shadow: 2px 2px 0 rgba(0,0,0,0.2); transform: translate(2px,2px); }
        .stat-display { font-size: 9px; color: #000; background: rgba(255,255,255,0.9); padding: 4px 6px; border: 2px solid #000; pointer-events: none; }
        .version-tag { font-size: 10px; color: rgba(0,0,0,0.5); background: rgba(255,255,255,0.8); padding: 4px; border-radius: 4px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; color: #fff; }
        .dialog-box { background: #fff; color: #000; border: 4px solid #000; padding: 20px; width: 85%; max-width: 350px; box-shadow: 10px 10px 0 #000; }
        .dialog-box h2 { font-size: 18px; margin-bottom: 15px; color: #e74c3c; line-height: 1.4; }
        .dialog-box p { font-size: 12px; line-height: 1.6; margin-bottom: 20px; white-space: pre-line; }
        .action-btn { background: #3498db; color: #fff; border: 4px solid #000; padding: 15px 30px; font-family: 'Press Start 2P'; font-size: 14px; cursor: pointer; transition: all 0.1s; }
        .action-btn:active { transform: scale(0.95); }
        #ending-scene { position: absolute; top:0; left:0; width:100%; height:100%; background: #2c1e1e; display: none; z-index: 300; flex-direction: column; justify-content: center; align-items: center; }
        #game-over-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 250; }
        .float-text { position: absolute; font-size: 14px; font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; text-shadow: 2px 2px 0 #000; color: #fff; z-index: 150; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 50% { transform: translateY(-25px) scale(1.2); } 100% { transform: translateY(-50px); opacity: 0; } }
        .screen-shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0%,100% { transform: translate(0,0); } 25% { transform: translate(-4px,3px); } 50% { transform: translate(4px,-3px); } 75% { transform: translate(-3px,-2px); } }
        /* Combo display */
        #combo-display { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); font-size: 16px; color: #ffd700; text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,215,0,0.5); pointer-events: none; z-index: 110; opacity: 0; transition: opacity 0.3s; }
        #combo-display.visible { opacity: 1; }
        /* Phase 2 speech bubbles */
        .speech-bubble { position: absolute; background: rgba(0,0,0,0.9); color: #ff6b6b; border: 2px solid #ff4444; border-radius: 12px; padding: 8px 12px; font-size: 9px; line-height: 1.5; max-width: 140px; pointer-events: none; z-index: 160; opacity: 0; transition: opacity 0.5s; text-shadow: none; font-family: 'Press Start 2P', cursive; }
        .speech-bubble.show { opacity: 1; }
        .speech-bubble::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid #ff4444; }
        /* Stun indicator */
        .stun-icon { position: absolute; font-size: 20px; pointer-events: none; z-index: 155; animation: stunSpin 1s linear infinite; }
        @keyframes stunSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Phase transition flash */
        .phase-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 190; pointer-events: none; opacity: 0; }
        .phase-flash.active { animation: flashBang 1.5s ease-out forwards; }
        @keyframes flashBang { 0% { opacity: 0.9; background: #ff0000; } 30% { opacity: 0.6; background: #8b0000; } 100% { opacity: 0; } }
    </style>
</head>

// --- Audio System ---
class AudioEngine {
    constructor() { this.ctx = null; this.playing = false; this.masterGain = null; this.musicInterval = null; }
    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.3;
        this.masterGain.connect(this.ctx.destination);
    }
    resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
    toggle() { this.init(); if (this.playing) { this.stop(); return false; } this.start(); return true; }
    start() { this.playing = true; this.resume(); this._playLoop(); }
    stop() { this.playing = false; if (this.musicInterval) clearTimeout(this.musicInterval); }
    _playLoop() {
        if (!this.playing) return;
        const melody = [261.63,293.66,329.63,349.23,392.00,392.00,349.23,329.63,293.66,261.63];
        const durations = [0.25,0.25,0.25,0.25,0.5,0.25,0.25,0.25,0.25,0.5];
        let t = this.ctx.currentTime;
        melody.forEach((note, i) => {
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'square'; osc.frequency.value = note;
            gain.gain.setValueAtTime(0.08, t); gain.gain.exponentialRampToValueAtTime(0.01, t + durations[i] * 0.8);
            osc.connect(gain); gain.connect(this.masterGain);
            osc.start(t); osc.stop(t + durations[i]); t += durations[i];
        });
        this.musicInterval = setTimeout(() => this._playLoop(), (t - this.ctx.currentTime) * 1000);
    }
    playHit() {
        if (!this.ctx) return; this.resume();
        const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.12);
        gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.connect(gain); gain.connect(this.masterGain); osc.start(now); osc.stop(now + 0.12);
    }
    playLaunch() {
        if (!this.ctx) return; this.resume();
        const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.connect(gain); gain.connect(this.masterGain); osc.start(now); osc.stop(now + 0.2);
    }
    // Phase 2 dramatic sound
    playPhase2() {
        if (!this.ctx) return; this.resume();
        const now = this.ctx.currentTime;
        [100, 80, 60, 50].forEach((freq, i) => {
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, now + i*0.3); gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.3 + 0.3);
            osc.connect(gain); gain.connect(this.masterGain);
            osc.start(now + i*0.3); osc.stop(now + i*0.3 + 0.3);
        });
    }
}

// --- Game Engine ---
const App = {
    lang: 'cn', audioEngine: new AudioEngine(),
    engine: null, world: null, cvs: null, ctx: null,
    stage: 0, score: 0, ammo: 30, poopMode: false,
    projectiles: [], furniture: [], targets: [],
    boss: null, slingshots: [], activeTouches: new Map(),
    ended: false, trails: [], combo: 0, comboTimer: 0,
    hitSet: new Set(),
    // Phase 2 state
    bossPhase: 1,
    stunTimer: 0, // frames remaining for stun
    speechBubbles: [], // active speech bubble DOM elements
    phase2DefenseMultiplier: 1
};

// --- Init ---
function init() {
    App.cvs = document.getElementById('world');
    App.cvs.width = CFG.w; App.cvs.height = CFG.h;
    App.ctx = App.cvs.getContext('2d');
    App.engine = Matter.Engine.create();
    App.world = App.engine.world;
    App.engine.gravity.y = CFG.gravity;

    const wallOpts = { isStatic: true, restitution: 1.0, friction: 0.05 };
    Matter.World.add(App.world, [
        Matter.Bodies.rectangle(CFG.w/2, CFG.h+50, CFG.w, 100, { ...wallOpts, label: 'floor' }),
        Matter.Bodies.rectangle(-50, CFG.h/2, 100, CFG.h, wallOpts),
        Matter.Bodies.rectangle(CFG.w+50, CFG.h/2, 100, CFG.h, wallOpts),
        Matter.Bodies.rectangle(CFG.w/2, -50, CFG.w, 100, wallOpts)
    ]);

    Matter.Events.on(App.engine, 'collisionStart', handleCollisions);
    setupInput(App.cvs);

    (function loop() {
        if(App.ended) return;
        Matter.Engine.update(App.engine, 1000/60);
        updateLogic();
        render(App.ctx);
        requestAnimationFrame(loop);
    })();

    showDialog('stage1');
}

// --- Logic & Stages ---
function updateLogic() {
    // Combo timer decay
    if (App.comboTimer > 0) { App.comboTimer--; if (App.comboTimer <= 0) { App.combo = 0; hideCombo(); } }

    // Stun timer decay
    if (App.stunTimer > 0) {
        App.stunTimer--;
        if (App.stunTimer <= 0) {
            clearStunEffects();
        }
    }

    // Clean up old projectiles
    for (let i = App.projectiles.length - 1; i >= 0; i--) {
        const p = App.projectiles[i];
        const pos = p.position;
        const speed = Math.hypot(p.velocity.x, p.velocity.y);
        if (!p._slowFrames) p._slowFrames = 0;
        if (speed < 0.2) p._slowFrames++; else p._slowFrames = 0;
        if (pos.y > CFG.h + 100 || pos.x < -100 || pos.x > CFG.w + 100 || p._slowFrames > 200) {
            Matter.World.remove(App.world, p);
            App.projectiles.splice(i, 1);
        }
    }

    // Update trails
    for (let i = App.trails.length - 1; i >= 0; i--) {
        App.trails[i].life--;
        if (App.trails[i].life <= 0) App.trails.splice(i, 1);
    }
    App.projectiles.forEach(p => {
        if (Math.hypot(p.velocity.x, p.velocity.y) > 2) {
            App.trails.push({ x: p.position.x, y: p.position.y, life: 10, color: p.isHard ? '#ffd700' : '#795548' });
        }
    });

    if(App.stage === 3 && App.boss && App.boss.hp > 0) {
        const b = App.boss;
        // Phase 2: faster, more erratic movement
        const moveSpeed = App.bossPhase === 2 ? 250 : 400;
        const moveRange = App.bossPhase === 2 ? 120 : 80;
        const bobSpeed = App.bossPhase === 2 ? 150 : 200;
        Matter.Body.setPosition(b.body, {
            x: CFG.w/2 + Math.sin(Date.now()/moveSpeed) * moveRange,
            y: b._baseY + Math.sin(Date.now()/bobSpeed) * 20
        });

        // Boss Attack - Phase 2 attacks faster and harder
        const attackRate = App.bossPhase === 2 ? 0.04 : 0.025;
        const attackDmg = App.bossPhase === 2 ? 50 : 30;
        if(Math.random() < attackRate) {
            const aliveAllies = App.targets.filter(t => t.hp > 0 && t.label === 'ally');
            if (aliveAllies.length > 0) {
                const target = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
                const p = Matter.Bodies.circle(b.body.position.x, b.body.position.y+40, 12, {
                    label: 'boss_atk', density: 0.15, restitution: 0.9
                });
                p.damage = attackDmg;
                Matter.World.add(App.world, p);
                const dx = target.position.x - b.body.position.x;
                const dy = target.position.y - b.body.position.y;
                const angle = Math.atan2(dy, dx);
                const speed = App.bossPhase === 2 ? 10 + Math.random() * 5 : 8 + Math.random() * 4;
                Matter.Body.setVelocity(p, { x: Math.cos(angle)*speed, y: Math.sin(angle)*speed });
                App.projectiles.push(p);
            }
        }

        // Check game over
        const aliveAllies = App.targets.filter(t => t.hp > 0 && t.label === 'ally');
        if (aliveAllies.length === 0) showGameOver();
    }
}

function loadStage(n) {
    App.stage = n;
    const allBodies = Matter.Composite.allBodies(App.world);
    allBodies.forEach(b => {
        if (b.label === 'ally' || b.label === 'boss' || b.label === 'target' || b.label === 'furniture' || !b.isStatic) {
            Matter.World.remove(App.world, b);
        }
    });
    App.projectiles = []; App.furniture = []; App.targets = []; App.slingshots = [];
    App.trails = []; App.combo = 0; App.comboTimer = 0; App.hitSet.clear();
    App.bossPhase = 1; App.stunTimer = 0; App.phase2DefenseMultiplier = 1;
    clearStunEffects();

    if(n === 1) {
        App.ammo = 30; App.poopMode = false; App.score = 0;
        // Improved furniture with better physics - varied density and friction
        createFurniture(150, 500, 'Table', 100, 40, { density: 0.04, friction: 0.3, restitution: 0.8 });
        createFurniture(300, 400, 'Cabinet', 60, 80, { density: 0.08, friction: 0.4, restitution: 0.7 });
        createFurniture(100, 600, 'Chair', 40, 60, { density: 0.02, friction: 0.2, restitution: 0.9 });
        createTarget(150, 450, 'Vina');
        createTarget(300, 350, 'Matt');
        createTarget(100, 550, 'Coco');
        createTarget(350, 600, 'Cola');
        App.slingshots = [{x: CFG.w/2, y: 700, anchor:{x:CFG.w/2, y:700}, active:false}];
    }
    else if(n === 2) {
        App.ammo = 999; App.poopMode = true;
        App.boss = createBoss('Lola', 2000, 150);
        App.slingshots = [{x: CFG.w/2, y: 700, anchor:{x:CFG.w/2, y:700}, active:false}];
    }
    else if(n === 3) {
        App.ammo = 999; App.poopMode = true;
        const team = ['Coco','Cola','Vina','Matt','Lola'];
        // Allies spread across bottom, slingshots centered below them
        const startX = (CFG.w - (team.length - 1) * 80) / 2;
        for(let i=0; i<5; i++) {
            const x = startX + i * 80;
            const y = CFG.floorY - 20;
            const body = Matter.Bodies.rectangle(x, y, 30, 40, { isStatic: true, label: 'ally' });
            body.hp = 200; body.maxHp = 200; body.name = team[i];
            App.targets.push(body);
            Matter.World.add(App.world, body);
            App.slingshots.push({ x, y: 750, anchor:{x, y:750}, active:false, owner:team[i] });
        }
        App.boss = createBoss('Vison', 8000, 120);
    }
    updateUI();
}

function createFurniture(x, y, type, w, h, physicsOpts) {
    const opts = Object.assign({ density: 0.05, friction: 0.8, restitution: 0.1, label: 'furniture' }, physicsOpts || {});
    const body = Matter.Bodies.rectangle(x, y, w, h, opts);
    body.furnitureType = type; body.w = w; body.h = h; body.hp = 100;
    App.furniture.push(body);
    Matter.World.add(App.world, body);
}

function createTarget(x, y, name) {
    // Improved hit detection: slightly larger collision body
    const body = Matter.Bodies.rectangle(x, y, 34, 44, { density: 0.01, label: 'target', chamfer: { radius: 4 }, restitution: 0.8 });
    body.name = name; body.hp = 50; body.maxHp = 50;
    App.targets.push(body);
    Matter.World.add(App.world, body);
}

function createBoss(name, hp, y) {
    // Larger collision radius for better hit detection
    const body = Matter.Bodies.circle(CFG.w/2, y, 45, { isStatic: true, label: 'boss' });
    const boss = { name, hp, maxHp: hp, body, _baseY: y };
    Matter.World.add(App.world, body);
    return boss;
}

// --- Phase 2 Transition ---
function triggerPhase2() {
    App.bossPhase = 2;
    App.phase2DefenseMultiplier = 4;

    // Flash effect
    const flash = document.getElementById('phase-flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 1500);

    // Sound
    App.audioEngine.playPhase2();

    // Boss regenerates with new HP
    App.boss.hp = 12000;
    App.boss.maxHp = 12000;

    // Stun all allies for 8 seconds (480 frames at 60fps)
    App.stunTimer = 480;

    // Show speech bubbles
    showPhase2Speeches();

    // Screen shake (heavy)
    const container = document.getElementById('game-container');
    container.style.animation = 'none';
    void container.offsetWidth;
    container.style.animation = 'shake 0.3s ease-in-out 3';

    // Show phase 2 dialog
    showDialog('phase2');
}

function showPhase2Speeches() {
    clearStunEffects();
    const L = LANG_DATA[App.lang];
    const container = document.getElementById('game-container');
    const scaleX = container.offsetWidth / App.cvs.width;
    const scaleY = container.offsetHeight / App.cvs.height;

    App.targets.forEach((ally, i) => {
        if (ally.hp <= 0 || ally.label !== 'ally') return;

        const speechKey = `speech_${ally.name}`;
        const text = L[speechKey] || '...';

        // Speech bubble from Vison to this ally
        const bubble = document.createElement('div');
        bubble.className = 'speech-bubble';
        bubble.textContent = text;
        const allyX = ally.position.x * scaleX;
        const allyY = (ally.position.y - 70) * scaleY;
        bubble.style.left = Math.max(10, Math.min(allyX - 60, container.offsetWidth - 150)) + 'px';
        bubble.style.top = Math.max(10, allyY - 50) + 'px';
        container.appendChild(bubble);
        App.speechBubbles.push(bubble);

        // Staggered reveal
        setTimeout(() => bubble.classList.add('show'), i * 600);
        // Fade out after 6 seconds
        setTimeout(() => bubble.classList.remove('show'), 6000 + i * 200);

        // Stun icon above ally
        const stunIcon = document.createElement('div');
        stunIcon.className = 'stun-icon';
        stunIcon.textContent = '💫';
        stunIcon.style.left = (allyX - 10) + 'px';
        stunIcon.style.top = (ally.position.y * scaleY - 45) + 'px';
        container.appendChild(stunIcon);
        App.speechBubbles.push(stunIcon);
    });
}

function clearStunEffects() {
    App.speechBubbles.forEach(el => el.remove());
    App.speechBubbles = [];
}

// --- Render ---
function render(ctx) {
    // Phase 2: darker background
    if (App.stage === 3 && App.bossPhase === 2) {
        ctx.fillStyle = '#2a1a1a';
    } else {
        ctx.fillStyle = '#f0e6d2';
    }
    ctx.fillRect(0, 0, CFG.w, CFG.h);

    // Floor
    ctx.fillStyle = App.bossPhase === 2 ? '#4a2a2a' : '#c4a882';
    ctx.fillRect(0, CFG.floorY + 30, CFG.w, 4);

    // Phase 2 ambient particles
    if (App.bossPhase === 2) {
        for (let i = 0; i < 8; i++) {
            const px = (Date.now()/10 + i * 137) % CFG.w;
            const py = (Date.now()/15 + i * 91) % CFG.h;
            ctx.globalAlpha = 0.15 + Math.sin(Date.now()/300 + i) * 0.1;
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // Trails
    App.trails.forEach(t => {
        ctx.globalAlpha = t.life / 10;
        ctx.fillStyle = t.color;
        ctx.beginPath(); ctx.arc(t.x, t.y, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Furniture
    App.furniture.forEach(f => {
        if(f.hp <= 0) return;
        const pos = f.position;
        ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(f.angle);
        if(IMAGES[f.furnitureType]) ctx.drawImage(IMAGES[f.furnitureType], -f.w/2, -f.h/2, f.w, f.h);
        else { ctx.fillStyle = '#8b4513'; ctx.fillRect(-f.w/2, -f.h/2, f.w, f.h); }
        // Damage cracks
        if (f.hp < 60) {
            ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-f.w/4, -f.h/4); ctx.lineTo(f.w/4, f.h/4); ctx.stroke();
        }
        if (f.hp < 30) {
            ctx.beginPath(); ctx.moveTo(f.w/4, -f.h/3); ctx.lineTo(-f.w/4, f.h/3); ctx.stroke();
        }
        ctx.restore();
    });

    // Targets / Allies
    App.targets.forEach(t => {
        if(t.hp <= 0) return;
        const pos = t.position;
        ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(t.angle);

        // Stunned effect
        if (App.stunTimer > 0 && t.label === 'ally') {
            ctx.globalAlpha = 0.4 + Math.sin(Date.now()/100) * 0.2;
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff6b6b';
        }

        // God Mode Aura (Stage 3 allies)
        if(App.stage === 3 && t.label === 'ally' && t.hp/t.maxHp < 0.5 && App.stunTimer <= 0) {
            ctx.shadowBlur = 15; ctx.shadowColor = '#ffd700';
            ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.fill();
        }

        if(IMAGES[t.name]) ctx.drawImage(IMAGES[t.name], -15, -20, 30, 40);

        // HP Bar
        const pct = t.hp / t.maxHp;
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
        ctx.fillStyle = '#333'; ctx.fillRect(-15, -30, 30, 5);
        ctx.fillStyle = pct > 0.5 ? '#2ecc71' : pct > 0.25 ? '#f39c12' : '#e74c3c';
        ctx.fillRect(-15, -30, 30*pct, 5);
        ctx.fillStyle = '#fff'; ctx.font = '6px Arial'; ctx.textAlign = 'center';
        ctx.fillText(t.name, 0, -33);
        ctx.restore();
    });

    // Boss
    if(App.boss && App.boss.hp > 0) {
        const b = App.boss;
        const pos = b.body.position;
        ctx.save(); ctx.translate(pos.x, pos.y);

        const pulse = Math.sin(Date.now()/300) * 5;

        if (App.bossPhase === 2) {
            // Phase 2: intense red/black aura with larger radius
            ctx.shadowBlur = 30 + pulse; ctx.shadowColor = '#ff0000';
            ctx.beginPath(); ctx.arc(0, 0, 60+pulse, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(139,0,0,0.7)'; ctx.fill();
            // Inner dark core
            ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(50,0,0,0.5)'; ctx.fill();
            // Phase 2 indicator text
            ctx.fillStyle = '#ff4444'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
            ctx.fillText('PHASE 2', 0, -78);
            // Defense shield visual
            ctx.strokeStyle = 'rgba(255,100,0,0.6)'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, 55 + pulse, 0, Math.PI * 2);
            ctx.setLineDash([8, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        } else {
            ctx.shadowBlur = 20 + pulse; ctx.shadowColor = b.name==='Vison'?'#f00':'#8e44ad';
            ctx.beginPath(); ctx.arc(0,0,50+pulse,0,Math.PI*2);
            ctx.fillStyle = b.name==='Vison'?'rgba(139,0,0,0.6)':'rgba(128,0,128,0.6)'; ctx.fill();
        }
        ctx.shadowBlur = 0;

        if(IMAGES[b.name]) ctx.drawImage(IMAGES[b.name], -40, -40, 80, 80);

        // Boss HP Bar
        const pct = b.hp / b.maxHp;
        ctx.fillStyle = '#333'; ctx.fillRect(-60, -65, 120, 12);
        const grad = ctx.createLinearGradient(-60, 0, 60, 0);
        if (App.bossPhase === 2) {
            grad.addColorStop(0, '#ff0000'); grad.addColorStop(0.5, '#ff4400'); grad.addColorStop(1, '#880000');
        } else {
            grad.addColorStop(0, '#ff0000'); grad.addColorStop(1, '#ff6600');
        }
        ctx.fillStyle = grad; ctx.fillRect(-60, -65, 120*pct, 12);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
        ctx.fillText(b.name, 0, -70);
        ctx.restore();
    }

    // Slingshots
    App.slingshots.forEach(s => {
        const isStunned = App.stunTimer > 0 && App.stage === 3;

        ctx.fillStyle = isStunned ? '#888' : '#5d4037';
        ctx.fillRect(s.anchor.x - 3, s.anchor.y - 15, 6, 30);
        ctx.fillRect(s.anchor.x - 18, s.anchor.y - 15, 12, 6);
        ctx.fillRect(s.anchor.x + 6, s.anchor.y - 15, 12, 6);

        // Rubber band (grayed out if stunned)
        ctx.beginPath();
        ctx.moveTo(s.anchor.x-15, s.anchor.y - 12);
        ctx.lineTo(s.active ? s.x : s.anchor.x, s.active ? s.y : s.anchor.y - 12);
        ctx.lineTo(s.anchor.x+15, s.anchor.y - 12);
        ctx.strokeStyle = isStunned ? '#666' : '#c0392b'; ctx.lineWidth = 3; ctx.stroke();

        if(s.active && !isStunned) {
            const r = App.stage===3 ? 15 : 10;
            ctx.fillStyle = App.stage===3 ? '#3e2723' : '#795548';
            ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.fill();
            const dist = Math.hypot(s.x - s.anchor.x, s.y - s.anchor.y);
            const power = Math.min(dist / 100, 1);
            ctx.fillStyle = `rgba(255,${Math.floor(255*(1-power))},0,0.7)`;
            ctx.fillRect(s.anchor.x - 20, s.anchor.y + 20, 40 * power, 4);
        }
    });

    // Projectiles
    App.projectiles.forEach(p => {
        ctx.save(); ctx.translate(p.position.x, p.position.y); ctx.rotate(p.angle);
        if (p.label === 'boss_atk') {
            ctx.fillStyle = App.bossPhase === 2 ? '#8b0000' : '#000';
            ctx.shadowBlur = App.bossPhase === 2 ? 15 : 10;
            ctx.shadowColor = App.bossPhase === 2 ? '#ff4400' : '#f00';
            ctx.beginPath(); ctx.arc(0, 0, p.circleRadius, 0, Math.PI*2); ctx.fill();
            // Phase 2 boss projectiles have an outer ring
            if (App.bossPhase === 2) {
                ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, p.circleRadius + 3, 0, Math.PI*2); ctx.stroke();
            }
            ctx.shadowBlur = 0;
        } else {
            // Player projectiles: slightly better visual
            ctx.fillStyle = p.isHard ? '#3e2723' : '#795548';
            ctx.beginPath(); ctx.arc(0, 0, p.circleRadius, 0, Math.PI*2); ctx.fill();
            // Highlight ring
            ctx.strokeStyle = p.isHard ? '#ffd700' : '#a1887f'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, 0, p.circleRadius - 1, 0, Math.PI*2); ctx.stroke();
            if(p.isHard) { ctx.fillStyle='#ffd700'; ctx.font='bold 8px Arial'; ctx.textAlign='center'; ctx.fillText('200', 0, 4); }
        }
        ctx.restore();
    });
}

// --- Interaction ---
function setupInput(cvs) {
    function getCanvasPos(e) {
        const rect = cvs.getBoundingClientRect();
        const scaleX = cvs.width / rect.width;
        const scaleY = cvs.height / rect.height;
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; }
        else { clientX = e.clientX; clientY = e.clientY; }
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    const start = (id, e) => {
        // Block slingshot during stun
        if (App.stunTimer > 0 && App.stage === 3) return;
        const pos = getCanvasPos(e);
        App.slingshots.forEach((sl, i) => {
            if(Math.hypot(pos.x-sl.anchor.x, pos.y-sl.anchor.y) < 60) {
                App.activeTouches.set(id, i);
                sl.active = true; sl.x = pos.x; sl.y = pos.y;
            }
        });
    };

    const move = (id, e) => {
        if (App.stunTimer > 0 && App.stage === 3) return;
        if(App.activeTouches.has(id)) {
            const i = App.activeTouches.get(id);
            const sl = App.slingshots[i];
            const pos = getCanvasPos(e);
            const dx = pos.x - sl.anchor.x; const dy = pos.y - sl.anchor.y;
            const angle = Math.atan2(dy, dx);
            const dist = Math.min(Math.hypot(dx, dy), 100);
            sl.x = sl.anchor.x + Math.cos(angle)*dist;
            sl.y = sl.anchor.y + Math.sin(angle)*dist;
        }
    };

    const end = (id) => {
        if (App.stunTimer > 0 && App.stage === 3) { App.activeTouches.delete(id); return; }
        if(App.activeTouches.has(id)) {
            const i = App.activeTouches.get(id);
            fire(i);
            App.activeTouches.delete(id);
        }
    };

    cvs.addEventListener('mousedown', e => start(-1, e));
    window.addEventListener('mousemove', e => move(-1, e));
    window.addEventListener('mouseup', () => end(-1));
    cvs.addEventListener('touchstart', e => { e.preventDefault(); for(let t of e.changedTouches) start(t.identifier, e); }, {passive:false});
    cvs.addEventListener('touchmove', e => { e.preventDefault(); for(let t of e.changedTouches) move(t.identifier, e); }, {passive:false});
    cvs.addEventListener('touchend', e => { for(let t of e.changedTouches) end(t.identifier); });
}

function fire(idx) {
    const sl = App.slingshots[idx];
    if (!sl.active) return;
    sl.active = false;
    const dx = sl.anchor.x - sl.x; const dy = sl.anchor.y - sl.y;
    const power = Math.hypot(dx, dy) * 0.2;
    if (power < 2) { sl.x = sl.anchor.x; sl.y = sl.anchor.y; return; }
    const angle = Math.atan2(dy, dx);
    sl.x = sl.anchor.x; sl.y = sl.anchor.y;

    const isHard = (App.stage === 3);
    // Improved projectile physics: slightly more varied shapes
    const radius = isHard ? 15 : 10;
    const p = Matter.Bodies.circle(sl.anchor.x, sl.anchor.y - 15, radius, {
        density: isHard ? 0.08 : 0.05, restitution: 0.95, friction: 0.02, label: 'projectile'
    });

    let dmg = 20;
    if(isHard) dmg = 200;
    if(App.stage === 3) {
        const god = App.targets.some(t => t.hp > 0 && t.label === 'ally' && t.hp/t.maxHp < 0.5);
        if(god) {
            dmg *= 5;
            createFloatText(sl.anchor.x, sl.anchor.y-50, LANG_DATA[App.lang].god, "#ffd700");
        }
    }
    p.damage = dmg; p.isHard = isHard;

    Matter.World.add(App.world, p);
    Matter.Body.setVelocity(p, { x: Math.cos(angle)*power, y: Math.sin(angle)*power });
    App.projectiles.push(p);
    App.audioEngine.playLaunch();
    if (navigator.vibrate) navigator.vibrate(15);

    if(!App.poopMode) {
        App.ammo--;
        if(App.ammo <= 0) {
            App.poopMode = true;
            createFloatText(CFG.w/2, CFG.h/2, LANG_DATA[App.lang].poop_mode, "#8d6e63");
        }
        updateUI();
    }
}

function handleCollisions(e) {
    e.pairs.forEach(pair => {
        const a = pair.bodyA, b = pair.bodyB;

        // --- Player projectiles ---
        let proj = null, other = null;
        if (a.label === 'projectile') { proj = a; other = b; }
        else if (b.label === 'projectile') { proj = b; other = a; }

        if (proj) {
            const hitKey = `${proj.id}_${other.id}`;
            if (App.hitSet.has(hitKey)) return;
            App.hitSet.add(hitKey);
            setTimeout(() => App.hitSet.delete(hitKey), 500);

            if(other.label === 'target') {
                if(other.hp > 0) {
                    other.hp -= proj.damage;
                    App.score += proj.damage;
                    addCombo();
                    createFloatText(other.position.x, other.position.y, `-${proj.damage}`, '#f00');
                    App.audioEngine.playHit(); screenShake();
                    if(other.hp <= 0) {
                        Matter.World.remove(App.world, other);
                        if(App.stage === 1 && App.targets.filter(t => t.hp > 0 && t.label === 'target').length === 0)
                            showDialog('stage2');
                    }
                }
            }
            else if(other.label === 'furniture') {
                const f = App.furniture.find(x => x === other);
                if(f && f.hp > 0) {
                    f.hp -= proj.damage;
                    createFloatText(other.position.x, other.position.y, `-${proj.damage}`, '#ff9800');
                    if(f.hp <= 0) Matter.World.remove(App.world, f);
                }
            }
            else if(other.label === 'boss') {
                if (App.boss && App.boss.hp > 0) {
                    // Phase 2: 4x defense = damage / 4
                    let actualDmg = proj.damage;
                    if (App.bossPhase === 2) {
                        actualDmg = Math.floor(proj.damage / App.phase2DefenseMultiplier);
                        createFloatText(other.position.x + 30, other.position.y - 30, `DEF x4!`, '#ff8800');
                    }
                    App.boss.hp -= actualDmg;
                    App.score += actualDmg;
                    addCombo();
                    createFloatText(other.position.x, other.position.y, `-${actualDmg}`, App.bossPhase === 2 ? '#ff4400' : '#f0f');
                    App.audioEngine.playHit(); screenShake();
                    if(App.boss.hp <= 0) {
                        if (App.bossPhase === 1 && App.stage === 3) {
                            // Trigger Phase 2 instead of dying
                            triggerPhase2();
                        } else {
                            // Phase 2 defeated = real victory
                            Matter.World.remove(App.world, App.boss.body);
                            if(App.stage === 2) showDialog('stage2_win');
                            if(App.stage === 3) playEnding();
                        }
                    }
                }
            }
            return;
        }

        // --- Boss attack projectiles ---
        let bossProj = null, bossOther = null;
        if (a.label === 'boss_atk') { bossProj = a; bossOther = b; }
        else if (b.label === 'boss_atk') { bossProj = b; bossOther = a; }

        if (bossProj && bossOther) {
            if (bossOther.label === 'ally' && bossOther.hp > 0) {
                const dmg = bossProj.damage || 30;
                bossOther.hp -= dmg;
                createFloatText(bossOther.position.x, bossOther.position.y, `-${dmg}`, '#ff0000');
                screenShake();
                Matter.World.remove(App.world, bossProj);
                const idx = App.projectiles.indexOf(bossProj);
                if (idx > -1) App.projectiles.splice(idx, 1);
                if (bossOther.hp <= 0)
                    createFloatText(bossOther.position.x, bossOther.position.y - 20, `${bossOther.name} DOWN!`, '#ff4444');
            }
            if (bossOther.label === 'floor' || bossOther.isStatic) {
                Matter.World.remove(App.world, bossProj);
                const idx = App.projectiles.indexOf(bossProj);
                if (idx > -1) App.projectiles.splice(idx, 1);
            }
        }
    });
}

// --- Combo System ---
function addCombo() {
    App.combo++; App.comboTimer = 90;
    const L = LANG_DATA[App.lang];
    if (App.combo >= 3) {
        const el = document.getElementById('combo-display');
        el.textContent = `${App.combo}x ${L.combo}!`;
        el.classList.add('visible');
        el.style.fontSize = Math.min(16 + App.combo * 2, 32) + 'px';
    }
}
function hideCombo() { document.getElementById('combo-display').classList.remove('visible'); }

function screenShake() {
    const container = document.getElementById('game-container');
    container.classList.remove('screen-shake');
    void container.offsetWidth;
    container.classList.add('screen-shake');
}

function showGameOver() {
    App.ended = true;
    const L = LANG_DATA[App.lang];
    document.getElementById('gameover-title').textContent = L.gameover_title;
    document.getElementById('gameover-text').textContent = L.gameover_text;
    document.getElementById('game-over-overlay').style.display = 'flex';
}

function updateUI() {
    const L = LANG_DATA[App.lang];
    const ammoEl = document.getElementById('ammoCount');
    const stageEl = document.getElementById('scoreDisplay');
    if (ammoEl) ammoEl.textContent = App.poopMode ? '💩: ∞' : `${L.ammo}: ${App.ammo}`;
    if (stageEl) stageEl.textContent = `${L.stage}: ${App.stage}`;
}

function showDialog(id) {
    const el = document.getElementById('dialog-overlay');
    const L = LANG_DATA[App.lang];
    const data = {
        'stage1': { t: L.stage1_title, c: L.stage1_text, b: L.stage1_btn, fn: () => loadStage(1) },
        'stage2': { t: L.stage2_title, c: L.stage2_text, b: L.stage2_btn, fn: () => loadStage(2) },
        'stage2_win': { t: L.stage2_win_title, c: L.stage2_win_text, b: L.stage2_win_btn, fn: () => showDialog('stage3') },
        'stage3': { t: L.stage3_title, c: L.stage3_text, b: L.stage3_btn, fn: () => loadStage(3) },
        'phase2': { t: L.phase2_title, c: L.phase2_text, b: L.phase2_btn, fn: () => { /* dismiss dialog, stun continues */ } }
    };
    const d = data[id];
    document.getElementById('dialog-title').innerText = d.t;
    document.getElementById('dialog-text').innerText = d.c;
    document.getElementById('dialog-btn').innerText = d.b;
    document.getElementById('dialog-btn').onclick = () => { el.style.display = 'none'; d.fn(); };
    el.style.display = 'flex';
}

function createFloatText(x, y, txt, color) {
    const el = document.createElement('div');
    el.className = 'float-text'; el.innerText = txt; el.style.color = color;
    const container = document.getElementById('game-container');
    const scaleX = container.offsetWidth / App.cvs.width;
    const scaleY = container.offsetHeight / App.cvs.height;
    el.style.left = (x * scaleX) + 'px';
    el.style.top = (y * scaleY) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

function playEnding() {
    App.ended = true;
    clearStunEffects();
    document.getElementById('ending-scene').style.display = 'flex';
    document.getElementById('ending-text').innerText = LANG_DATA[App.lang].ending_text;
    document.fonts.ready.then(() => {
        const ctx = document.getElementById('ending-canvas').getContext('2d');
        ctx.fillStyle = '#3e2723'; ctx.fillRect(0,0,300,300);
        const grad = ctx.createRadialGradient(150, 150, 20, 150, 150, 150);
        grad.addColorStop(0, 'rgba(255,200,100,0.3)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, 300, 300);
        ctx.fillStyle = '#5d4037'; ctx.fillRect(40, 200, 220, 60);
        ctx.fillStyle = '#4e342e'; ctx.fillRect(40, 200, 220, 10);
        const team = ['Coco','Cola','Vina','Matt','Lola','Vison'];
        team.forEach((name, i) => { const x = 30 + i * 45; if (IMAGES[name]) ctx.drawImage(IMAGES[name], x, 150, 35, 45); });
        ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 20px "Press Start 2P"';
        ctx.textAlign = 'center'; ctx.fillText('CHEERS!', 150, 100);
        ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
        ctx.fillText(`Score: ${App.score}`, 150, 280);
    });
}

// --- UI Bindings ---
document.getElementById('lang-btn').onclick = function() {
    App.lang = App.lang==='cn'?'en':'cn';
    this.innerText = App.lang.toUpperCase();
    updateUI();
    document.getElementById('music-btn').innerText = App.audioEngine.playing ? LANG_DATA[App.lang].musicOn : LANG_DATA[App.lang].musicOff;
};

document.getElementById('music-btn').onclick = function() {
    const playing = App.audioEngine.toggle();
    this.innerText = playing ? LANG_DATA[App.lang].musicOn : LANG_DATA[App.lang].musicOff;
};

init();
</script>
